<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Inventory Tool</title>
  <link rel="stylesheet" href="styles/main.css?v=20251223-1728">
  <style>
    /* Override for embedded mode (iframe) */
    body { overflow: auto !important; }
    .app-container { height: auto !important; min-height: 100vh; }

    /* Dark mode support - syncs with parent app */
    body.dark-theme {
      background-color: #1a1a2e !important;
      color: #e0e0e0 !important;
    }
    body.dark-theme .main-content {
      background-color: #1a1a2e !important;
    }
    body.dark-theme .content-wrapper {
      background-color: #1e293b !important;
    }
    body.dark-theme .content-body {
      color: #e0e0e0 !important;
    }
    body.dark-theme .card,
    body.dark-theme .stats-card,
    body.dark-theme .mode-card,
    body.dark-theme .upload-area,
    body.dark-theme .scan-section,
    body.dark-theme .report-section {
      background-color: #2d3748 !important;
      border-color: #4a5568 !important;
      color: #e0e0e0 !important;
    }
    body.dark-theme .step-indicator .step {
      background-color: #2d3748 !important;
      border-color: #4a5568 !important;
      color: #a0aec0 !important;
    }
    body.dark-theme .step-indicator .step.active {
      background-color: #4338ca !important;
      border-color: #4338ca !important;
      color: #fff !important;
    }
    body.dark-theme .stats-summary {
      background-color: #2d3748 !important;
      border-color: #4a5568 !important;
    }
    body.dark-theme .stats-summary .stat-item {
      background-color: #374151 !important;
      border-color: #4a5568 !important;
    }
    body.dark-theme h2, body.dark-theme h3 {
      color: #f0f0f0 !important;
    }
    body.dark-theme p {
      color: #cbd5e0 !important;
    }
    body.dark-theme input,
    body.dark-theme select,
    body.dark-theme textarea {
      background-color: #374151 !important;
      border-color: #4a5568 !important;
      color: #e0e0e0 !important;
    }
    body.dark-theme .btn-secondary,
    body.dark-theme .btn-outline {
      background-color: #374151 !important;
      border-color: #4a5568 !important;
      color: #e0e0e0 !important;
    }
    body.dark-theme .tips-section,
    body.dark-theme .info-box {
      background-color: #374151 !important;
      border-color: #4a5568 !important;
      color: #cbd5e0 !important;
    }
    body.dark-theme .notification {
      background-color: #2d3748 !important;
      color: #e0e0e0 !important;
    }
    body.dark-theme table {
      color: #e0e0e0 !important;
    }
    body.dark-theme table th {
      background-color: #374151 !important;
      color: #e0e0e0 !important;
    }
    body.dark-theme table td {
      border-color: #4a5568 !important;
    }
    body.dark-theme table tr:nth-child(even) {
      background-color: #2d3748 !important;
    }
    body.dark-theme .progress-bar {
      background-color: #374151 !important;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 主内容区域 -->
    <main class="main-content" style="margin-left: 0;">
      <div class="content-wrapper">
        <div class="content-body" id="content-body">
          <!-- 动态加载内容区域 -->
        </div>
      </div>
    </main>
  </div>

  <!-- 通知弹窗 -->
  <div class="notification" id="notification">
    <div class="notification-content">
      <span class="notification-icon"></span>
      <span class="notification-message"></span>
    </div>
  </div>

  <!-- API Sync Adapter (must load before other scripts) -->
  <script src="scripts/api-sync.js"></script>

  <!-- Theme & Language sync with parent app -->
  <script>
    (function() {
      // Theme sync
      function syncTheme() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.body.classList.add('dark-theme');
        } else {
          document.body.classList.remove('dark-theme');
        }
      }
      syncTheme();
      
      // Language sync - reload module when language changes
      let lastLang = localStorage.getItem('i18nextLng') || '';
      function checkLangChange() {
        const currentLang = localStorage.getItem('i18nextLng') || '';
        if (currentLang !== lastLang) {
          lastLang = currentLang;
          // Re-render the asset inventory module with new language (without resetting state)
          if (typeof window.loadAssetInventoryModule === 'function' && window.assetInventoryData) {
            const contentBody = document.getElementById('content-body');
            if (contentBody) {
              window.loadAssetInventoryModule(contentBody);
            }
          }
        }
      }
      
      // Listen for storage changes from parent
      window.addEventListener('storage', function(e) {
        if (e.key === 'theme') syncTheme();
        if (e.key === 'i18nextLng') checkLangChange();
      });
      // Poll as fallback for same-origin iframe
      setInterval(function() { syncTheme(); checkLangChange(); }, 500);
    })();
  </script>

  <!-- 数据管理器 -->
  <script src="scripts/data-manager.js"></script>
  <script src="scripts/data-migration.js"></script>
  <script src="scripts/utils.js"></script>
  
  <!-- Asset Inventory 模块 -->
  <script src="scripts/modules/asset-inventory-i18n.js?v=2"></script>
  <script src="scripts/modules/asset-inventory.js?v=2"></script>
  <script src="scripts/modules/session-manager.js?v=1"></script>
  
  <!-- 主应用脚本 -->
  <script src="scripts/app.js?v=2"></script>
</body>
</html>
